<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Выбор библиотеки</title>
    <style>
        body {
            background-image: url('/fon/pexels-minan1398.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;

            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            text-align: center;

            background-image: url('/fon/blue.jpg'); /* 🔸 путь к фону */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(255, 255, 255, 0.8); /* fallback-подложка с полупрозрачностью */
            /*max-width: 960px;*/
            /*margin: 0 auto;*/
            /*padding: 30px;*/
            /*border-radius: 12px;*/
            /*box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);*/
            /*text-align: center;*/
        }

        h1 {
            margin-bottom: 25px;
            color: #007bff;
        }

        .error {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background-color: #dc3545; /* насыщенно-красный */
            padding: 15px 25px;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border: 2px solid #a71d2a;
            text-align: center;
            animation: shake 0.3s ease-in-out 1;
        }

        .library-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .library-button {
            flex: 0 1 calc(30% - 10px);
            height: 150px;
            background-color: #e9ecef;
            background-size: cover;
            background-position: center;
            color: #fff; /* можно также попробовать #f8f9fa */
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;

            text-shadow:
                    2px 2px 4px rgba(0, 0, 0, 0.6),  /* тень снизу */
                    -1px -1px 3px rgba(255, 255, 255, 0.2); /* небольшое высветление */
        }

        .library-button:hover {
            filter: brightness(1.1);
        }

        .library-button.selected {
            /*border-color: #007bff;*/
            /*box-shadow: 0 0 10px rgba(0, 123, 255, 0.6);*/
            border: 6px solid #007bff; /* яркая зелёная рамка */
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.8); /* зелёная подсветка */
            transform: scale(1.05); /* лёгкое увеличение */
            transition: all 0.3s ease-in-out;
            background-color: rgba(0, 0, 0, 0.4); /* затемнение фона */
        }

        .btn-submit {
            margin-top: 30px;
            padding: 14px 28px;
            font-size: 18px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-submit:hover {
            background: #218838;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
            100% { transform: translateX(0); }
        }

        .library-button span {
            background-color: rgba(0, 0, 0, 0.4); /* прозрачный фон */
            padding: 5px 10px;
            border-radius: 5px;
        }

        .logout-link {
            text-decoration: none; /* ✅ убирает подчёркивание */
        }

        .extra-buttons {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;

            background-image: url('/fon/blue.jpg'); /* 🔸 путь к фону */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(255, 255, 255, 0.8);
        }

        .extra-buttons-container {
            max-width: 960px; /* как у контейнера сверху */
            margin: 30px auto;
            padding: 20px 30px;
            border-radius: 12px;
            background-image: url('/fon/blue.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(255, 255, 255, 0.85); /* fallback */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);

            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .square-button {
            min-width: 220px;
            height: 60px;
            background: linear-gradient(135deg, #28a745, #218838);
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .square-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.25);
        }
    </style>
    <script>
       function validateLibrarySelection() {
           const selectedId = document.getElementById('selectedLibraryId').value;
           if (!selectedId) {
               alert("Пожалуйста, выберите библиотеку перед входом.");
               return false;
           }
           return true;
       }
    </script>
</head>
<body>

<div class="container">
    <h1>Выбор библиотеки</h1>

    <form method="post" action="/admin/main-page" id="libraryForm" onsubmit="return validateLibrarySelection()">
        <input type="hidden" name="libraryId" id="selectedLibraryId"/>

        <div class="library-grid">
            <div class="library-button"
                 th:each="lib : ${libraries}"
                 th:data-id="${lib.id}"
                 th:style="'background-image: url(/images/library-' + ${lib.id} + '.jpg);'"
                 th:classappend="${errorLibraryId} == lib.id ? ' error-visible' : ''"
                 onclick="selectLibrary(this)">
                <span th:text="${lib.name}"></span>
            </div>
        </div>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <div th:if="${error}">
            <button type="button" class="btn-submit" onclick="history.back()">⬅ Назад</button>
        </div>
        <div th:unless="${error}">
            <button type="submit" class="btn-submit">📚 Войти</button>
            <button type="button" class="logout-link btn-submit" onclick="window.location.href='/logout'" title="Выйти из аккаунта">
                🔒 <span>Выйти из аккаунта</span>
            </button>
        </div>
    </form>
</div>

<div class="extra-buttons-container">
    <a href="/admin/crud-platforms" class="square-button">
        CRUD for Platforms/OS/Versions
    </a>
    <a href="/admin/test-cases?docType=TEST_CASE&docId=1" class="square-button">
        TestCases
    </a>
    <a href="/admin/audit-criteria" class="square-button">
        AuditCriteria
    </a>
</div>

<script>
    function selectLibrary(element) {
        document.querySelectorAll('.library-button').forEach(el => el.classList.remove('selected'));

        element.classList.add('selected');

        const id = element.getAttribute('data-id');
        document.getElementById('selectedLibraryId').value = id;
    }
</script>

</body>
</html>
